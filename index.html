<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d0d">
<title>ことばリズム道場</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=Noto+Serif+JP:wght@400;700&display=swap');

:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --border: rgba(255,255,255,0.08);
  --gold: #e8c97a;
  --gold-dim: rgba(232,201,122,0.15);
  --cyan: #5ee6d0;
  --text: #f0ead8;
  --dim: #484848;
  --perfect-color: #ffe066;
  --good-color: #5ee6d0;
  --miss-color: #ff5252;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background:var(--bg); color:var(--text);
  font-family:'Noto Serif JP',serif;
  overflow:hidden;
  touch-action:none;
  -webkit-tap-highlight-color:transparent;
  user-select:none; -webkit-user-select:none;
}

.screen {
  display:none;
  position:fixed; inset:0;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
.screen.active { display:flex; }

/* =========================================
   START SCREEN
========================================= */
#start-screen {
  gap:0; padding:0; text-align:center;
  position:relative; overflow:hidden;
  justify-content:flex-end;
  /* 確実に全画面 */
  width:100%; height:100dvh;
}

/* 背景画像 — 全画面カバー */
#start-screen::before {
  content:'';
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  background-image: var(--title-bg);
  background-size: cover;
  background-position: center top;
  background-repeat: no-repeat;
  z-index:0;
}

/* オーバーレイなし */
#start-screen::after {
  content: none;
}

/* 画像の上に重ねるコンテンツ — 画面最下部に固定 */
#start-content {
  position:absolute;
  bottom:0; left:0; right:0;
  z-index:2;
  display:flex; flex-direction:column;
  align-items:center;
  gap:10px;
  padding:0 24px;
  padding-bottom:max(env(safe-area-inset-bottom,0px) + 24px, 36px);
}

.how-to {
  font-size:11px; color:rgba(255,255,255,.8); line-height:2.0;
  letter-spacing:.1em;
  border:1px solid rgba(255,255,255,.15);
  padding:10px 20px;
  background:rgba(0,0,0,.15);
  backdrop-filter:blur(4px);
  border-radius:6px;
  max-width:280px; width:100%;
}

.start-btn {
  font-family:'Zen Antique Soft',serif;
  font-size:16px; letter-spacing:.2em;
  line-height:1.6;
  color:var(--gold); background:rgba(0,0,0,.25);
  border:1.5px solid var(--gold);
  padding:10px 0; cursor:pointer;
  width:min(240px,72vw);
  transition:background .2s;
  clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  -webkit-clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);
  backdrop-filter:blur(2px);
}
.start-btn:active { background:rgba(232,201,122,.22); }
.start-btn.sub {
  color:rgba(232,201,122,.85);
  border-color:rgba(232,201,122,.55);
  font-size:15px;
  background:rgba(0,0,0,.15);
}

@keyframes breathe {
  0%,100% { filter:drop-shadow(0 0 18px rgba(232,201,122,.3)); }
  50%      { filter:drop-shadow(0 0 48px rgba(232,201,122,.7)); }
}

/* =========================================
   GAME SCREEN  —  縦レイアウト
   [header]
   [field  ←  文字が飛ぶ]
   [typed  ←  完成文字]
   [tap-area]
========================================= */
#game-screen {
  justify-content:flex-start;
  background:var(--bg);
}

/* ヘッダー */
.g-header {
  width:100%;
  display:flex; justify-content:space-between; align-items:center;
  padding:env(safe-area-inset-top, 12px) 20px 10px;
  padding-top:max(env(safe-area-inset-top), 12px);
  background:rgba(13,13,13,.95);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  z-index:10;
}
.g-hcol { display:flex; flex-direction:column; align-items:flex-start; }
.g-hcol.right { align-items:flex-end; }
.g-label { font-size:10px; color:var(--dim); letter-spacing:.2em; }
.g-val   { font-size:17px; color:var(--text); letter-spacing:.05em; }
#score-display {
  font-family:'Zen Antique Soft',serif;
  font-size:22px; color:var(--gold);
}

/* フィールド（文字が飛ぶエリア）*/
#field-wrap {
  position:relative;
  width:100%;
  flex:1 1 0;          /* 残りの縦スペースをすべて使う */
  min-height:0;
  overflow:hidden;
  border-bottom:1px solid var(--border);
}
canvas#field { width:100%; height:100%; display:block; }

/* 中心ゾーンリング */
#zone-ring {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:44px; height:44px; border-radius:50%;
  border:2px solid rgba(232,201,122,.25);
  pointer-events:none;
  animation:ring-pulse 2s ease-in-out infinite;
}
@keyframes ring-pulse {
  0%,100% { border-color:rgba(232,201,122,.2); box-shadow:none; }
  50%      { border-color:rgba(232,201,122,.55); box-shadow:0 0 18px rgba(232,201,122,.25); }
}

/* 打った文字エリア */
#typed-display {
  width:100%;
  height:52px;
  padding:8px 16px;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  justify-content:center;
  gap:0 1px;
  overflow:hidden;
  flex-shrink:0;
  background:rgba(13,13,13,.6);
  border-bottom:1px solid var(--border);
}
.typed-char {
  font-family:'Zen Antique Soft',serif;
  font-size:26px; letter-spacing:.04em;
  opacity:0; transform:translateY(8px) scale(.85);
  transition:opacity .18s ease, transform .18s ease;
}
.typed-char.perfect   { color:var(--perfect-color); }
.typed-char.excellent { color:#a8f07a; }
.typed-char.good      { color:var(--good-color); }
.typed-char.bad       { color:#ff9a3c; }
.typed-char.miss      { color:#444; }
.typed-char.show    { opacity:1; transform:translateY(0) scale(1); }

/* TAPエリア（画面下 1/4）*/
#tap-area {
  width:100%;
  flex-shrink:0;
  height:clamp(120px, 22vh, 170px);
  padding-bottom:env(safe-area-inset-bottom, 0px);
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(13,13,13,.8);
  position:relative;
}

#tap-btn {
  width:min(160px, 38vw);
  height:min(160px, 38vw);
  border-radius:50%;
  border:2.5px solid var(--gold);
  background:transparent;
  color:var(--gold);
  font-family:'Zen Antique Soft',serif;
  font-size:22px; letter-spacing:.15em;
  cursor:pointer;
  transition:all .08s;
  -webkit-tap-highlight-color:transparent;
  position:relative; z-index:1;
  box-shadow:0 0 0 rgba(232,201,122,0), inset 0 0 0 rgba(232,201,122,0);
}
#tap-btn:active, #tap-btn.pressed {
  transform:scale(.85);
  background:rgba(232,201,122,.16);
  box-shadow:0 0 32px rgba(232,201,122,.5), inset 0 0 20px rgba(232,201,122,.1);
}

/* 判定テキスト */
#judgment {
  position:fixed; top:38%; left:50%;
  transform:translate(-50%,-50%);
  font-family:'Zen Antique Soft',serif;
  font-size:clamp(18px, 5vw, 28px); font-weight:700;
  pointer-events:none; z-index:200; opacity:0;
  text-shadow:0 2px 16px currentColor;
  white-space:nowrap;
}
@keyframes j-fly {
  0%   { opacity:1; transform:translate(-50%,-50%) scale(1.25); }
  60%  { opacity:1; transform:translate(-50%,-80%) scale(1); }
  100% { opacity:0; transform:translate(-50%,-130%) scale(.9); }
}
#judgment.show { animation:j-fly .65s ease forwards; }

/* コンボ */
#combo-popup {
  position:fixed; top:28%; left:50%;
  transform:translateX(-50%);
  font-family:'Zen Antique Soft',serif;
  font-size:40px; color:var(--gold);
  pointer-events:none; z-index:200; opacity:0;
  text-shadow:0 0 28px var(--gold);
  white-space:nowrap;
}

/* =========================================
   RESULT SCREEN
========================================= */
#result-screen {
  gap:20px; padding:32px 24px; text-align:center;
  overflow-y:auto;
}
.res-sentence {
  font-family:'Zen Antique Soft',serif;
  font-size:clamp(18px,4.5vw,26px);
  color:var(--gold); letter-spacing:.18em;
  max-width:88vw; line-height:1.9;
}
.res-title { font-size:12px; color:var(--dim); letter-spacing:.4em; }
.big-pct {
  font-family:'Zen Antique Soft',serif;
  font-size:clamp(56px,16vw,80px); line-height:1;
}
.big-pct.clear { color:var(--perfect-color); text-shadow:0 0 40px rgba(255,224,102,.5); }
.big-pct.fail  { color:var(--miss-color); }
.pct-bar-wrap  { width:min(280px,80vw); }
.pct-bar       { height:6px; background:rgba(255,255,255,.06); border-radius:3px; overflow:hidden; }
.pct-fill      { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--cyan),var(--gold)); width:0%; transition:width 1.2s cubic-bezier(.25,.46,.45,.94); }
.res-msg       { font-size:15px; letter-spacing:.22em; opacity:0; animation:fadein .5s 1s ease forwards; }
@keyframes fadein { from{opacity:0}to{opacity:1} }
.res-btns      { display:flex; flex-direction:column; gap:12px; width:min(280px,80vw); opacity:0; animation:fadein .5s 1.6s ease forwards; }
.res-btn {
  font-family:'Zen Antique Soft',serif; font-size:16px; letter-spacing:.25em;
  color:var(--text); background:transparent;
  border:1px solid rgba(255,255,255,.22);
  padding:16px 28px; cursor:pointer; transition:all .2s;
  clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
  -webkit-clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);
}
.res-btn:active  { border-color:var(--gold); color:var(--gold); background:var(--gold-dim); }
.res-btn.primary { border-color:var(--gold); color:var(--gold); }

/* =========================================
   STAGE CLEAR
========================================= */
#stageclear-screen { gap:24px; padding:24px; text-align:center; }
.sc-title {
  font-family:'Zen Antique Soft',serif;
  font-size:clamp(32px,8vw,54px); color:var(--gold);
  animation:breathe 2s ease-in-out infinite;
}
.sc-score { font-size:13px; color:var(--dim); letter-spacing:.3em; }
.sc-score span { font-family:'Zen Antique Soft',serif; font-size:36px; color:var(--text); display:block; margin-top:4px; }
.sc-btns { display:flex; flex-direction:column; gap:12px; width:min(280px,80vw); }

/* ===== 設定ボタン ===== */
#settings-btn {
  position:absolute; top:50%; right:12px;
  transform:translateY(-50%);
  width:52px; height:52px;
  background:rgba(232,201,122,0.1);
  border:1.5px solid rgba(232,201,122,0.4);
  border-radius:8px;
  color:var(--gold); font-size:26px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  z-index:20; padding:0;
  -webkit-tap-highlight-color:transparent;
  transition:all .15s;
}
#settings-btn:active {
  background:rgba(232,201,122,0.25);
  border-color:var(--gold);
  transform:translateY(-50%) scale(.92);
}

/* ===== ポーズメニュー ===== */
#pause-overlay {
  display:none;
  position:fixed; inset:0;
  background:rgba(0,0,0,.8);
  backdrop-filter:blur(8px);
  z-index:500;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:20px;
  overflow-y:auto;
  padding:24px;
}
#pause-overlay.active { display:flex; }
.pause-title {
  font-family:'Zen Antique Soft',serif;
  font-size:26px; color:var(--gold); letter-spacing:.3em;
}
.pause-btns { display:flex; flex-direction:column; gap:12px; width:min(260px,80vw); }

/* ステージ選択グリッド */
.stage-select-label {
  font-size:11px; color:var(--dim); letter-spacing:.35em; text-align:center;
  margin-top:4px;
}
.stage-grid {
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  gap:8px;
  width:min(300px,88vw);
}
.stage-cell {
  aspect-ratio:1;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:rgba(0,0,0,.45);
  border:1px solid rgba(255,255,255,.2);
  border-radius:6px;
  font-family:'Zen Antique Soft',serif;
  font-size:16px;
  color:#fff;
  text-shadow: 0 0 6px rgba(0,0,0,.8), 0 1px 3px rgba(0,0,0,1);
  cursor:pointer;
  transition:all .15s;
  -webkit-tap-highlight-color:transparent;
  line-height:1.2;
}
.stage-cell:active { background:rgba(232,201,122,.25); border-color:var(--gold); color:var(--gold); text-shadow:0 0 8px rgba(232,201,122,.6); }
.stage-cell.current { border-color:var(--gold); color:var(--gold); background:rgba(232,201,122,.15); text-shadow:0 0 8px rgba(232,201,122,.5); }
.stage-cell .phase-dot {
  width:6px; height:6px; border-radius:50%;
  margin-bottom:3px;
}
.stage-cell.ph1 .phase-dot { background:#888; }
.stage-cell.ph2 .phase-dot { background:var(--good-color); }
.stage-cell.ph3 .phase-dot { background:var(--perfect-color); }
.stage-cell.ph4 .phase-dot { background:var(--miss-color); }
.stage-cell.cleared {
  border-color: rgba(94,230,208,.5);
  background: rgba(94,230,208,.06);
}
.stage-cell.cleared .phase-dot { background: var(--good-color) !important; }
.stage-cell .badge {
  font-size:9px; letter-spacing:.05em;
  color:#fff;
  text-shadow:0 0 4px rgba(94,230,208,.8);
  line-height:1;
}

/* ホーム 続きから パネル */
#home-continue-panel {
  display:none;
  flex-direction:column;
  align-items:center;
  gap:12px;
  width:100%;
}
#home-continue-panel.open { display:flex; }
.home-btns {
  display:flex; flex-direction:column;
  align-items:center;
  gap:12px; width:100%;
}

/* ===== ゲームクリア ===== */
#gameclear-screen { gap:24px; padding:32px 24px; text-align:center; }
.gc-title {
  font-family:'Zen Antique Soft',serif;
  font-size:clamp(30px,8vw,52px); color:var(--perfect-color);
  text-shadow:0 0 40px rgba(255,224,102,.6);
  animation:breathe 2s ease-in-out infinite;
}
.gc-sub { font-size:13px; color:var(--dim); letter-spacing:.3em; margin-top:-8px; }
.gc-score { font-family:'Zen Antique Soft',serif; font-size:42px; color:var(--text); }
</style>
</head>
<body>

<!-- ===== START ===== -->
<div id="start-screen" class="screen active">
  <div id="start-content">
    <div class="how-to">
      文字が中央に向かって流れてきます<br>
      中心に入ったタイミングで
      <strong style="color:var(--gold)">TAP！</strong><br>
      打った文字が積み上がって<br>
      文章が完成します
    </div>
    <div class="home-btns">
      <button class="start-btn" ontouchstart="" onclick="startGame()">最初から<br>スタート</button>
      <button class="start-btn sub" ontouchstart="" onclick="toggleContinuePanel()" id="continue-btn">続きから<br>スタート</button>
    </div>
    <!-- 続きからパネル -->
    <div id="home-continue-panel">
      <div class="stage-select-label" style="color:rgba(255,255,255,.6)">文章を選んでスタート</div>
      <div class="stage-grid" id="home-stage-grid"></div>
    </div>
  </div>
</div>

<!-- ===== GAME ===== -->
<div id="game-screen" class="screen">
  <div class="g-header">
    <div class="g-hcol">
      <div class="g-label">文章</div>
      <div class="g-val" id="hd-stage">1 / 20</div>
    </div>
    <div id="score-display">0</div>
    <div class="g-hcol right">
      <div class="g-label">コンボ</div>
      <div class="g-val" id="hd-combo">0</div>
    </div>
    <button id="settings-btn" ontouchstart="" onclick="openPause()">⚙</button>
  </div>

  <div id="field-wrap">
    <canvas id="field"></canvas>
    <div id="zone-ring"></div>
  </div>

  <div id="typed-display"></div>

  <div id="tap-area">
    <button id="tap-btn">TAP</button>
  </div>
</div>

<!-- 判定・コンボ（fixed） -->
<div id="judgment"></div>
<div id="combo-popup"></div>

<!-- ===== RESULT ===== -->
<div id="result-screen" class="screen">
  <div class="res-title">完成した文章</div>
  <div class="res-sentence" id="res-sentence"></div>
  <div class="pct-bar-wrap">
    <div class="res-title" style="margin-bottom:8px">完成度</div>
    <div class="pct-bar"><div class="pct-fill" id="res-fill"></div></div>
    <div class="big-pct" id="res-pct">0%</div>
  </div>
  <div class="res-msg" id="res-msg"></div>
  <div class="res-btns" id="res-btns"></div>
</div>

<!-- ===== STAGE CLEAR ===== -->
<div id="stageclear-screen" class="screen">
  <div class="sc-title">STAGE CLEAR！</div>
  <div class="sc-score">トータルスコア<span id="sc-score-val">0</span></div>
  <div class="sc-btns" id="sc-btns"></div>
</div>

<!-- ===== ゲームクリア ===== -->
<div id="gameclear-screen" class="screen">
  <div class="gc-title">GAME CLEAR！</div>
  <div class="gc-sub">全 20 文章 クリア</div>
  <div class="sc-score">トータルスコア<span class="gc-score" id="gc-score-val">0</span></div>
  <div class="res-btns" style="opacity:1;flex-direction:column;width:min(260px,80vw)" id="gc-btns"></div>
</div>

<!-- ===== ポーズメニュー ===== -->
<div id="pause-overlay">
  <div class="pause-title">⏸ 設定</div>
  <div class="pause-btns">
    <button class="res-btn primary" onclick="resumeGame()">つ　づ　け　る</button>
    <button class="res-btn" onclick="restartSentence()">も　う　一　度</button>
    <button class="res-btn" onclick="goHome()">ホームに戻る</button>
  </div>
  <div class="stage-select-label">文章を選んでジャンプ</div>
  <div class="stage-grid" id="pause-stage-grid"></div>
</div>

<script>
// ============================================================
// ステージデータ
// ============================================================
// 全文章プール（ランダムに選ばれる）
const ALL_SENTENCES = [
  // もともとの9文章
  '働いたら負けかなと思ってる',
  'まだあわてるような時間じゃない',
  '今日も日本は平和です',
  '俺でなきゃ見逃しちゃうね',
  'そこに気づくとは天才か',
  'ちょっと何言ってるかわからない',
  '無駄に完成度高い',
  'その無駄な情熱、嫌いじゃない',
  '失敗してるのに満点みたいな顔するな',
  // 追加文章
  '好きすぎて滅',
  '働いて働いて働いてまいります',
  '今日、好きになりました',
  'ミャクミャクってやっぱり可愛くないよね',
  'エッホエッホエッホエッホ',
  'かわいいだけじゃだめですか？',
  'お返事まだカナ？おじさん構文',
  '両手に男です',
  'なんでもchatGPTに相談する若者',
  'おぱんちゅうさぎ',
  'お薬出しておきますね、頭のほうに',
  'なんでそこだけ達者なん',
  '沈黙は気まづいので嫌いです',
  'MBTIで人は分類できない',
  '恋愛ほど難しいものは無い',
  // 新規追加9文章
  'どしたん？話聞こか？',
  '風呂キャン界隈5日目',
  '空気を読む力だけで出世する国',
  '「多様性」という便利な言葉',
  'SNSでは全員幸せそうで、電車では全員死にそう',
  '優しさより、優しく見えることの方が大事',
  'つながる時代に孤独が深まる',
  '生きやすさを求めた結果、息苦しいルールが増えた',
  '世の中は顔じゃない、ただし顔もかなり大事',
];

// STAGES は互換性のために残す（clearThreshold参照用）
const STAGES = [
  { id:1, label:'ステージ 1', clearThreshold:55, sentences:[] },
  { id:2, label:'ステージ 2', clearThreshold:60, sentences:[] },
  { id:3, label:'ステージ 3', clearThreshold:65, sentences:[] },
];


// 速度フェーズ設定
// フェーズ1:  1〜 5文章目 → 1文字、360px/sから1.2倍ずつ
// フェーズ2:  6〜10文章目 → 2文字、360px/sにリセットして1.2倍ずつ
// フェーズ3: 11〜15文章目 → 3文字、360px/sにリセットして1.2倍ずつ
// フェーズ4: 16〜20文章目 → 3文字、360px/sにリセットして1.2倍ずつ（最終ステージ）
const PHASE_BASE_SPEED = 360;
const PHASE_ACCEL      = 1.2;
const STAGGER_MS       = 320;  // 複数文字をずらして出す間隔(ms)
const TOTAL_SENTENCES  = 20;   // 20文章目でゲームクリア

function getCurrentSpeed() {
  let concurrent, phaseIdx, baseSpeed, baseDelay;
  if (sentenceCount < 5) {
    // フェーズ1: 少し速め
    concurrent=1; phaseIdx=sentenceCount;
    baseSpeed=600; baseDelay=280;
  } else if (sentenceCount < 10) {
    concurrent=2; phaseIdx=sentenceCount-5;
    baseSpeed=360; baseDelay=500;
  } else if (sentenceCount < 15) {
    concurrent=3; phaseIdx=sentenceCount-10;
    baseSpeed=360; baseDelay=500;
  } else {
    concurrent=3; phaseIdx=sentenceCount-15;
    baseSpeed=360; baseDelay=500;
  }

  const mul       = Math.pow(PHASE_ACCEL, phaseIdx);
  const speed     = baseSpeed * mul;
  const nextDelay = Math.max(40,  Math.round(baseDelay / mul));
  const missDelay = Math.max(120, Math.round((baseDelay * 1.3) / mul));
  return { speed, nextDelay, missDelay, concurrent };
}


// 8方向スタート位置
const DIRS = [
  (W,H)=>({x:W/2,  y:-80  }),
  (W,H)=>({x:-80,  y:H/2  }),
  (W,H)=>({x:W+80, y:H/2  }),
  (W,H)=>({x:W/2,  y:H+80 }),
  (W,H)=>({x:-80,  y:-80  }),
  (W,H)=>({x:W+80, y:-80  }),
  (W,H)=>({x:-80,  y:H+80 }),
  (W,H)=>({x:W+80, y:H+80 }),
];

// 判定半径（W に対する割合）
const PERFECT_R   = 0.03;  // パーフェクト（ど真ん中のみ）
const EXCELLENT_R = 0.07;  // エクセレント（ゾーンリング内）
const GOOD_R      = 0.14;  // グッド
const BAD_R       = 0.25;  // バッド（これ以上外はミス）

// ============================================================
// 状態
// ============================================================
let canvas, ctx, W, H;
let stageIdx=0, sentenceIdx=0, charIdx=0, sentence='';
let score=0, combo=0, totalHits=0, totalAttempts=0;
let gameActive=false, animId=null, prevTime=0;
let tokens=[], spawnLocked=false;
let autoMissing=false; // 自動ミス処理中フラグ（二重ミス表示防止）

// ゲーム全体で累積するカウント（ステージまたいでもリセットしない）
let sentenceQueue=[];
let sentenceCount=0; // ゲーム開始からの総文章数

// 全文章プールをシャッフルして TOTAL_SENTENCES 分返す
function buildQueue(idx) {
  const arr = [...ALL_SENTENCES];
  for (let i=arr.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  // 20文章分だけ使う（プールが20以上あるので重複なし）
  return arr.slice(0, TOTAL_SENTENCES);
}


// 次に出すべき文字インデックスのキュー（複数同時スポーン管理）
let pendingChars=[]; // [{char, idx}]
let spawnTimer=null;
let spawnTimers=[];

// ============================================================
// Canvas — 縦長フィールドに合わせてリサイズ
// ============================================================
function initCanvas() {
  canvas = document.getElementById('field');
  ctx    = canvas.getContext('2d');
  resize();
}
function resize() {
  const wrap = document.getElementById('field-wrap');
  // getBoundingClientRect で実際のピクセルを取得
  const r = wrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  W = Math.floor(r.width);
  H = Math.floor(r.height);
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
}

// ============================================================
// 画面遷移
// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ============================================================
// ゲーム開始
// ============================================================
function startGame() { startGameFrom(0); }
function startStage() {
  sentenceIdx=0; combo=0; totalHits=0; totalAttempts=0;
  sentenceQueue = buildQueue(stageIdx);
  document.getElementById('hd-stage').textContent     = STAGES[stageIdx].label;
  document.getElementById('score-display').textContent = score;
  showScreen('game-screen');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    resize();
    startSentence();
  }));
}
function startSentence() {
  if (sentenceQueue.length===0) sentenceQueue=buildQueue(stageIdx);
  sentence=sentenceQueue.shift();
  charIdx=0; tokens=[]; prevTime=0; spawnLocked=false; gameActive=true;
  pendingChars=[];
  clearAllSpawnTimers();
  document.getElementById('typed-display').innerHTML='';
  document.getElementById('hd-stage').textContent = `${sentenceCount+1} / ${TOTAL_SENTENCES}`;
  if (animId) cancelAnimationFrame(animId);
  animId = requestAnimationFrame(ts=>{
    prevTime=ts;
    animId=requestAnimationFrame(loop);
  });
  spawnTimer = setTimeout(()=>{ if (gameActive) spawnNext(); }, 1000);
}

// ============================================================
// スポーン（必ず中心を通る・複数文字はずらして出す）
// ============================================================
function spawnNext() {
  if (!gameActive || charIdx >= sentence.length) return;
  const sp = getCurrentSpeed();

  // 既に飛んでいる文字のインデックスセット
  const alreadyOut = new Set(tokens.filter(t=>t.state==='flying').map(t=>t.charIdxOf));

  // concurrent 数分、まだ出ていない文字を収集
  const toSpawn = [];
  for (let i = charIdx; i < sentence.length && toSpawn.length < sp.concurrent; i++) {
    if (!alreadyOut.has(i)) toSpawn.push(i);
  }

  // 1文字目は即スポーン、2・3文字目は STAGGER_MS ずつ遅らせる
  toSpawn.forEach((cIdx, nth) => {
    const delay = nth * STAGGER_MS;
    if (delay === 0) {
      spawnChar(sentence[cIdx], cIdx, sp.speed);
    } else {
      const t = setTimeout(()=>{
        if (gameActive && cIdx >= charIdx) {
          const already = new Set(tokens.filter(t=>t.state==='flying').map(t=>t.charIdxOf));
          if (!already.has(cIdx)) spawnChar(sentence[cIdx], cIdx, sp.speed);
        }
      }, delay);
      spawnTimers.push(t);
    }
  });
}

function scheduleNextSpawn(delay) {
  if (spawnTimer) clearTimeout(spawnTimer);
  spawnTimer = setTimeout(()=>{ if (gameActive) spawnNext(); }, delay);
}

function clearAllSpawnTimers() {
  if (spawnTimer) { clearTimeout(spawnTimer); spawnTimer=null; }
  spawnTimers.forEach(t=>clearTimeout(t));
  spawnTimers=[];
}
function spawnChar(ch, cIdx, speed) {
  const dirFn = DIRS[Math.floor(Math.random()*DIRS.length)];
  const pos   = dirFn(W, H);
  const cx=W/2, cy=H/2;
  const dx=cx-pos.x, dy=cy-pos.y;
  const len=Math.hypot(dx,dy)||1;
  tokens.push({
    char:ch, charIdxOf:cIdx,
    x:pos.x, y:pos.y,
    vx:(dx/len)*speed, vy:(dy/len)*speed,
    state:'flying', alpha:1, scale:1, flashT:0, passed:false,
  });
}

// ============================================================
// ループ
// ============================================================
function loop(ts) {
  if (!gameActive) return;
  const dt = prevTime===0 ? 0 : Math.min((ts-prevTime)/1000, 0.05);
  prevTime=ts;
  update(dt);
  render();
  animId=requestAnimationFrame(loop);
}
function update(dt) {
  const cx=W/2, cy=H/2;
  for (let i=tokens.length-1;i>=0;i--) {
    const t=tokens[i];
    if (t.state==='flying') {
      t.x+=t.vx*dt; t.y+=t.vy*dt;
      if (Math.hypot(t.x-cx,t.y-cy)<W*GOOD_R) t.passed=true;
      if (t.passed&&(t.x<-100||t.x>W+100||t.y<-100||t.y>H+100)) {
        handleAutoMiss(t); tokens.splice(i,1);
      }
    } else if (t.state==='hit') {
      t.flashT+=dt; t.scale=1+t.flashT*3.5;
      t.alpha=Math.max(0,1-t.flashT*4.5);
      if (t.alpha<=0) tokens.splice(i,1);
    } else if (t.state==='miss') {
      t.flashT+=dt; t.alpha=Math.max(0,1-t.flashT*6);
      if (t.alpha<=0) tokens.splice(i,1);
    }
  }
}

// ============================================================
// 描画
// ============================================================
function render() {
  ctx.clearRect(0,0,W,H);
  // グリッド
  ctx.strokeStyle='rgba(255,255,255,0.022)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // 十字
  ctx.strokeStyle='rgba(232,201,122,0.06)';
  ctx.setLineDash([5,10]);
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();
  ctx.setLineDash([]);
  for (const t of tokens) drawToken(t);
}
function drawToken(t) {
  const cx=W/2,cy=H/2;
  const dist=Math.hypot(t.x-cx,t.y-cy);
  let color='#907850',glow=0;
  if      (t.state==='hit')         { color=t.perfect?'#ffe066':'#a8f07a'; glow=t.perfect?44:28; }
  else if (t.state==='miss')        { color='#ff5252'; }
  else if (dist<W*PERFECT_R)        { color='#ffe066'; glow=26; }
  else if (dist<W*EXCELLENT_R)      { color='#a8f07a'; glow=18; }
  else if (dist<W*GOOD_R)           { color='#5ee6d0'; glow=12; }
  else if (dist<W*BAD_R)            { color='#ff9a3c'; glow=6; }
  ctx.save();
  ctx.globalAlpha=t.alpha;
  ctx.translate(t.x,t.y);
  ctx.scale(t.scale,t.scale);
  if (glow>0){ctx.shadowColor=color;ctx.shadowBlur=glow;}
  // フィールドサイズに応じてフォントサイズを調整
  const fs=Math.round(Math.min(W,H)*0.11);
  ctx.font=`bold ${fs}px "Zen Antique Soft","Noto Serif JP",serif`;
  ctx.fillStyle=color;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(t.char,0,0);
  if (t.state==='flying') {
    ctx.shadowBlur=0;ctx.strokeStyle=color;ctx.lineWidth=1;
    ctx.globalAlpha*=0.18;
    ctx.beginPath();ctx.arc(0,0,fs*0.6,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();
}

// ============================================================
// オーディオシステム (Web Audio API)
// ============================================================
let audioCtx = null;
let masterGain;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.7;
    masterGain.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// 短い音を鳴らすユーティリティ
function playTone(freq, type, duration, vol=0.3, attack=0.005, release=0.08) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(masterGain);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + attack);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration + release);
  } catch(e) {}
}

function playNoise(duration, vol=0.15) {
  try {
    const ctx = getAudioCtx();
    const bufSize = ctx.sampleRate * duration;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i=0; i<bufSize; i++) data[i] = (Math.random()*2-1);
    const src = ctx.createBufferSource();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 800;
    src.buffer = buf;
    src.connect(filter); filter.connect(gain); gain.connect(masterGain);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    src.start(); src.stop(ctx.currentTime + duration);
  } catch(e) {}
}

// ===== 効果音定義 =====
const SFX = {
  tap: ()=> {
    playTone(880, 'sine', 0.08, 0.2);
    playNoise(0.04, 0.08);
  },
  perfect: ()=> {
    playTone(1320, 'sine', 0.12, 0.35);
    setTimeout(()=>playTone(1760, 'sine', 0.1, 0.25), 60);
    setTimeout(()=>playTone(2200, 'sine', 0.08, 0.2), 120);
  },
  excellent: ()=> {
    playTone(1100, 'sine', 0.12, 0.3);
    setTimeout(()=>playTone(1320, 'sine', 0.1, 0.22), 60);
  },
  good: ()=> {
    playTone(880, 'triangle', 0.1, 0.25);
    setTimeout(()=>playTone(1100, 'triangle', 0.08, 0.18), 50);
  },
  bad: ()=> {
    playTone(440, 'sawtooth', 0.08, 0.18);
  },
  miss: ()=> {
    playTone(220, 'sawtooth', 0.12, 0.2);
    playNoise(0.1, 0.12);
  },
  clear: ()=> {
    [523,659,784,1047].forEach((f,i)=> setTimeout(()=>playTone(f,'sine',0.3,0.3), i*80));
  },
  gameclear: ()=> {
    const melody = [523,659,784,659,784,1047,784,1047,1319];
    melody.forEach((f,i)=> setTimeout(()=>playTone(f,'sine',0.35,0.35), i*100));
  },
};


function getGrade(dist) {
  if (dist < W*PERFECT_R)   return 'perfect';
  if (dist < W*EXCELLENT_R) return 'excellent';
  if (dist < W*GOOD_R)      return 'good';
  if (dist < W*BAD_R)       return 'bad';
  return 'miss';
}
const GRADE_LABEL = {
  perfect:'パーフェクト', excellent:'エクセレント',
  good:'グッド', bad:'バッド', miss:'ミス'
};
const GRADE_SCORE = { perfect:100, excellent:70, good:50, bad:20, miss:0 };

function onTap(e) {
  e.preventDefault();
  if (!gameActive) return;
  const btn=document.getElementById('tap-btn');
  btn.classList.add('pressed');
  setTimeout(()=>btn.classList.remove('pressed'),100);

  const cx=W/2, cy=H/2;
  let best=null, bestD=Infinity;
  for (const t of tokens) {
    if (t.state!=='flying') continue;
    const d=Math.hypot(t.x-cx,t.y-cy);
    if (d<bestD){bestD=d;best=t;}
  }
  totalAttempts++;
  if (best && bestD < W*BAD_R) {
    const grade = getGrade(bestD);
    doHit(best, grade);
  } else {
    if (!autoMissing) {
      combo=0;
      showJudge('ミス','miss');
      updateComboUI();
      SFX.miss();
    }
  }
}
function doHit(t, grade) {
  t.state='hit'; t.perfect=(grade==='perfect'); t.flashT=0;
  totalHits++;
  if (grade!=='bad') combo++; else combo=0;
  score += (GRADE_SCORE[grade]||0) + (grade!=='bad'?combo*10:0);
  showJudge(GRADE_LABEL[grade], grade);
  updateComboUI();
  document.getElementById('score-display').textContent=score;
  spawnParticles(t.x,t.y,grade==='perfect'||grade==='excellent');
  appendTypedChar(t.char, grade);
  SFX[grade] ? SFX[grade]() : SFX.tap();
  charIdx++;
  if (charIdx>=sentence.length){setTimeout(()=>finishSentence(),500);return;}
  scheduleNextSpawn(getCurrentSpeed().nextDelay);
}
function handleAutoMiss(t) {
  autoMissing=true;
  combo=0;totalAttempts++;
  showJudge('ミス','miss');
  updateComboUI();
  appendTypedChar(t.char,'miss');
  SFX.miss();
  charIdx++;
  if (charIdx>=sentence.length){setTimeout(()=>finishSentence(),500); autoMissing=false; return;}
  scheduleNextSpawn(getCurrentSpeed().missDelay);
  setTimeout(()=>{ autoMissing=false; }, 300);
}

  if (combo>=3) {

    el.textContent=`${combo} COMBO！`;

function showJudge(text,grade) {
  const el=document.getElementById('judgment');
  el.textContent=text;
  const colors={perfect:'var(--perfect-color)',excellent:'#a8f07a',good:'var(--good-color)',bad:'#ff9a3c',miss:'var(--miss-color)'};
  el.style.color=colors[grade]||colors.miss;
  el.className='';el.offsetHeight;el.className='show';
}

// sentenceCount に応じたクリア閾値（5文章ごとに 95→90→85→80→75 を繰り返す）
function getThreshold(n) {
  const cycle = [95, 90, 85, 80, 75];
  return cycle[n % 5];
}

// ============================================================
// 文章完成
// ============================================================
function finishSentence() {
  gameActive=false; cancelAnimationFrame(animId);
  const pct       = totalAttempts>0 ? Math.round(totalHits/totalAttempts*100) : 0;
  const threshold = getThreshold(sentenceCount);
  if (pct >= threshold) { saveClearedSentence(sentenceCount); SFX.clear(); }
  sentenceCount++;
  if (sentenceCount >= TOTAL_SENTENCES) {
    showGameClear(pct);
    return;
  }
  showResult(sentence, pct, threshold);
}
function showResult(sent, pct, threshold) {
  document.getElementById('res-sentence').textContent=sent;
  document.getElementById('res-pct').textContent='0%';
  document.getElementById('res-pct').className='big-pct';
  document.getElementById('res-fill').style.width='0%';
  const msgEl=document.getElementById('res-msg');
  const btnsEl=document.getElementById('res-btns');
  msgEl.style.animation='none';btnsEl.style.animation='none';
  showScreen('result-screen');
  setTimeout(()=>{
    document.getElementById('res-fill').style.width=pct+'%';
    let cur=0;
    const iv=setInterval(()=>{
      cur=Math.min(cur+2,pct);
      document.getElementById('res-pct').textContent=cur+'%';
      if(cur>=pct)clearInterval(iv);
    },16);
    const cleared=pct>=threshold;
    document.getElementById('res-pct').className='big-pct '+(cleared?'clear':'fail');
    setTimeout(()=>{
      msgEl.textContent=cleared
        ?`クリア！ (目標${threshold}%達成)`
        :`もう一度！ (目標${threshold}%未達)`;
      msgEl.style.animation='';
      btnsEl.innerHTML='';
      if (cleared) {
        if (sentenceQueue.length>0) {
          addBtn(btnsEl,'次の文章へ','primary',()=>{
            totalHits=totalAttempts=0;
            showScreen('game-screen');
            requestAnimationFrame(()=>requestAnimationFrame(()=>{resize();startSentence();}));
          });
        } else {
          addBtn(btnsEl,'全クリア！もう一度','primary',()=>startGame());
        }
      }
      addBtn(btnsEl,'もう一度','',()=>{
        totalHits=totalAttempts=0;
        showScreen('game-screen');
        requestAnimationFrame(()=>requestAnimationFrame(()=>{resize();startSentence();}));
      });
      addBtn(btnsEl,'ホームに戻る','',()=>{
        gameActive=false; cancelAnimationFrame(animId); clearAllSpawnTimers();
        const panel=document.getElementById('home-continue-panel');
        panel.classList.remove('open');
        showScreen('start-screen');
      });
      btnsEl.style.animation='';
    },1100);
  },200);
}
function showStageClear() {
  document.getElementById('sc-score-val').textContent=score;
  const btns=document.getElementById('sc-btns');
  btns.innerHTML='';
  addBtn(btns,'次のステージへ','primary res-btn',()=>startStage());
  addBtn(btns,'最初から','res-btn',()=>startGame());
  showScreen('stageclear-screen');
}

// ============================================================
// クリア記録 (localStorage)
// ============================================================
const SAVE_KEY = 'kotoba_cleared';

function getClearedSet() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    return new Set(raw ? JSON.parse(raw) : []);
  } catch(e) { return new Set(); }
}

function saveClearedSentence(n) {
  try {
    const s = getClearedSet();
    s.add(n);
    localStorage.setItem(SAVE_KEY, JSON.stringify([...s]));
  } catch(e) {}
}

// ============================================================
// ステージ選択グリッド
// ============================================================
function phaseClass(n) {
  if (n < 5)  return 'ph1';
  if (n < 10) return 'ph2';
  if (n < 15) return 'ph3';
  return 'ph4';
}

function buildStageGrid(containerId, currentN, onSelect) {
  const el      = document.getElementById(containerId);
  const cleared = getClearedSet();
  el.innerHTML  = '';
  for (let i = 0; i < TOTAL_SENTENCES; i++) {
    const cell    = document.createElement('div');
    const ph      = phaseClass(i);
    const isClear = cleared.has(i);
    const isCur   = i === currentN;
    cell.className = `stage-cell ${ph}${isCur ? ' current' : ''}${isClear ? ' cleared' : ''}`;
    cell.innerHTML = `<div class="phase-dot"></div>${i+1}${isClear ? '<div class="badge">合格</div>' : ''}`;
    cell.ontouchstart = ()=>{};
    cell.onclick = ()=> onSelect(i);
    el.appendChild(cell);
  }
}

function toggleContinuePanel() {
  const panel = document.getElementById('home-continue-panel');
  const isOpen = panel.classList.toggle('open');
  const btn = document.getElementById('continue-btn');
  if (isOpen) {
    // 最後にクリアした次の文章をハイライト
    const cleared = getClearedSet();
    const next = cleared.size > 0 ? Math.min([...cleared].reduce((a,b)=>Math.max(a,b), 0) + 1, TOTAL_SENTENCES-1) : 0;
    buildStageGrid('home-stage-grid', next, startGameFrom);
    btn.style.borderColor = 'var(--gold)';
    btn.style.color = 'var(--gold)';
  } else {
    btn.style.borderColor = 'rgba(232,201,122,.5)';
    btn.style.color = 'rgba(232,201,122,.8)';
  }
}

function startGameFrom(n) {
  score=0; sentenceCount=n; stageIdx=0; combo=0;
  totalHits=0; totalAttempts=0;
  sentenceQueue = buildQueue(stageIdx);
  // n番目以降の文章をキューから使う（最初のn文章は捨てる）
  sentenceQueue = sentenceQueue.slice(n);
  if (sentenceQueue.length === 0) sentenceQueue = buildQueue(stageIdx);
  document.getElementById('score-display').textContent = score;
  showScreen('game-screen');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ resize(); startSentence(); }));
}

function jumpToSentence(n) {
  document.getElementById('pause-overlay').classList.remove('active');
  sentenceCount=n; combo=0; totalHits=0; totalAttempts=0;
  sentenceQueue = buildQueue(stageIdx);
  showScreen('game-screen');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ resize(); startSentence(); }));
}

// ゲームクリア
function showGameClear(lastPct) {
  stopBGM();
  SFX.gameclear();
  document.getElementById('gc-score-val').textContent=score;
  const btns=document.getElementById('gc-btns');
  btns.innerHTML='';
  addBtn(btns,'もう一度最初から','primary',()=>startGame());
  showScreen('gameclear-screen');
}

// ポーズ
function openPause() {
  if (!gameActive) return;
  gameActive=false;
  cancelAnimationFrame(animId);
  clearAllSpawnTimers();
  buildStageGrid('pause-stage-grid', sentenceCount, jumpToSentence);
  document.getElementById('pause-overlay').classList.add('active');
}
function resumeGame() {
  document.getElementById('pause-overlay').classList.remove('active');
  gameActive=true;
  prevTime=0;
  animId=requestAnimationFrame(ts=>{ prevTime=ts; animId=requestAnimationFrame(loop); });
  scheduleNextSpawn(getCurrentSpeed().nextDelay);
}
function restartSentence() {
  document.getElementById('pause-overlay').classList.remove('active');
  totalHits=0; totalAttempts=0;
  showScreen('game-screen');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ resize(); startSentence(); }));
}
function goHome() {
  document.getElementById('pause-overlay').classList.remove('active');
  gameActive=false; cancelAnimationFrame(animId); clearAllSpawnTimers();
  const panel = document.getElementById('home-continue-panel');
  panel.classList.remove('open');
  const btn = document.getElementById('continue-btn');
  btn.style.borderColor='rgba(232,201,122,.5)';
  btn.style.color='rgba(232,201,122,.8)';
  showScreen('start-screen');
}
function addBtn(parent,label,cls,fn) {
  const b=document.createElement('button');
  b.className='res-btn '+cls;b.textContent=label;b.onclick=fn;
  parent.appendChild(b);
}

// ============================================================
// パーティクル
// ============================================================
function spawnParticles(px,py,perfect) {
  const wrap=document.getElementById('field-wrap');
  const rect=wrap.getBoundingClientRect();
  const dpr=window.devicePixelRatio||1;
  const sx=canvas.width/(rect.width*dpr);
  const sy=canvas.height/(rect.height*dpr);
  const colors=perfect?['#ffe066','#ffc200','#fff5a0']:['#5ee6d0','#a8f5ec','#2ecfc4'];
  for(let i=0;i<12;i++){
    const p=document.createElement('div');
    const angle=(i/12)*Math.PI*2;
    const dist=36+Math.random()*48;
    const size=4+Math.random()*6;
    p.style.cssText=`
      position:fixed;pointer-events:none;z-index:300;border-radius:50%;
      width:${size}px;height:${size}px;
      background:${colors[i%colors.length]};
      left:${rect.left+px}px;top:${rect.top+py}px;
      --ex:${Math.cos(angle)*dist}px;--ey:${Math.sin(angle)*dist}px;
      animation:pfly .7s ease-out forwards;
    `;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),700);
  }
}
const ps=document.createElement('style');
ps.textContent=`@keyframes pfly{from{opacity:1;transform:translate(0,0) scale(1)}to{opacity:0;transform:translate(var(--ex),var(--ey)) scale(0)}}`;
document.head.appendChild(ps);

  if((e.code==='Space'||e.code==='Enter')&&gameActive){e.preventDefault();onTap(e);}
});
